<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Libros</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<!-- BLOQUEO: si no está logeado, lo manda al login -->
<script>
    if (localStorage.getItem("logeado") !== "true") {
        window.location.href = "login.html";
    }
</script>

<header>
    <img src="logo-kurobooks.png" alt="Logo KuroBooks" style="width:250px; display:block; margin:auto;">
    <h1>Mis Libros</h1>
    <button onclick="logout()" style="float:right; margin-top:-40px;">Cerrar sesión</button>
</header>


<section class="libros">
    <article class="libro">
        <h2>Mi Primer Libro</h2>
        <p>Descripción breve del libro.</p>
        <a href="libro1.html">Leer</a>
    </article>

    <!-- Puedes copiar este bloque para más libros -->
    <!--
    <article class="libro">
        <h2>Otro Libro</h2>
        <p>Descripción breve.</p>
        <a href="libro2.html">Leer</a>
    </article>
    -->
</section>

<script>
    function logout() {
        localStorage.setItem("logeado", "false");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
